name: EcoSim CI

on:
  push:
    branches: [main, godot-migration]
  pull_request:
    branches: [main, godot-migration]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore and test EcoSim.Core
        run: dotnet test EcoSim.sln -c Release
